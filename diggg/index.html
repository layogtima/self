<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>diggg — three.js mock</title>
<meta name="viewport" content="width=device-width, initial-scale=1">
<style>
  html, body { margin: 0; height: 100%; overflow: hidden; background: #0e0d12; }
  canvas { display: block; }
  #hud {
    position: fixed; left: 12px; bottom: 10px; color: #f0e6d2; z-index: 2;
    font: 12px ui-monospace, monospace; line-height: 1.7;
    text-shadow: 0 1px 3px #000; user-select: none; pointer-events: none;
  }
  /* cheap cinematic vignette (no GPU cost) */
  #vig {
    position: fixed; inset: 0; pointer-events: none; z-index: 1;
    box-shadow: inset 0 0 240px 30px rgba(0,0,0,0.35);
  }
  #cross {
    position: fixed; left: 50%; top: 50%; width: 6px; height: 6px; z-index: 2;
    margin: -3px 0 0 -3px; border-radius: 50%; pointer-events: none;
    background: rgba(255,255,255,0.85); box-shadow: 0 0 3px rgba(0,0,0,0.8);
  }
</style>
<script type="importmap">
{ "imports": {
  "three": "https://cdn.jsdelivr.net/npm/three@0.170.0/build/three.module.js",
  "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.170.0/examples/jsm/"
} }
</script>
</head>
<body>
<div id="vig"></div>
<div id="cross"></div>
<div id="hud">CLICK to look · WASD + SPACE/C fly · SHIFT boost · CLICK dig · RIGHT-CLICK place · N day/night</div>
<script>
  // surface any boot error right on the page (headless screenshots included)
  window.addEventListener('error', e => {
    const h = document.getElementById('hud');
    h.textContent = 'ERROR: ' + e.message; h.style.color = '#ff7a6a';
  });
</script>
<script type="module" src="./src/main.js"></script>
</body>
</html>
