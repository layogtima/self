    <script>
        // The story content in markdown
        const storyMarkdown = `# Chapter 1: Weight Discrepancies

The thing about going mad, Priya decided, was that it happened in spreadsheets.

Not dramatically. Not all at once with thunder and revelation. Just... 

Cell by cell. 

Row by row. 

Until you looked up from your laptop at 2:47 AM and realized you'd stopped blinking sometime around midnight and your filter coffee had grown a film on top that looked vaguely sentient.

"Okay," she said to her phone, which was propped against a stack of ISRO technical manuals on her desk. The phone's screen glowed blue-white in the darkness. "Okay, Divya, I need you to just... listen. Don't say anything. Just listen."

The WhatsApp call crackled. Her friend's face filled the screen, squinting with sleep and concern in equal measure.

"Priya, it's almost 3 AM—"

"I *know* what time it is." Priya's voice came out sharper than she meant. "I can see the bloody clock. Just—" 

She pressed her palms against her eyes. Saw stars. Red and yellow bursts behind her eyelids like little supernovas. When had she last blinked? 

"I need to say this out loud to someone or I'm going to lose my entire mind, okay? Just... let me talk."

Divya's expression shifted. Annoyance dissolving into something else. Worry, maybe. Or that look people get when they're trying to decide if you're having a breakdown or just need sleep.

"Okay," Divya said carefully. "Talking. I'm listening."

Priya pulled up the spreadsheet on her second monitor. The numbers glowed in the darkness of her Indiranagar flat. Green text on black background because she'd switched to dark mode three hours ago when the white screen started making her eyes water. Or maybe that was earlier. Time had gotten.

Slippery.

Outside, Bengaluru's night sounds filtered through her window: an auto-rickshaw somewhere, engine puttering, driver probably finishing his shift. A dog barking. Someone's TV playing too loud—some reality show, all shouting and dramatic music. Normal sounds. Sane sounds.

The sounds of a world that made sense.

"You know my dissertation, right?" Priya heard herself say. Her own voice sounded far away. Like it was coming from the next room. "Payload logistics in early lunar missions. Boring stuff. Supply chain optimization, weight distribution, fuel calculations—"

"The thing that was putting you to sleep six months ago," Divya said. "Yes."

"Right. Right, so." 

Priya's cursor hovered over a cell. Apollo 11. July 20, 1969. The numbers sat there, patient as stones.

"I'm going through Apollo 11's technical specifications, cross-referencing with the actual telemetry data, and there's this... discrepancy."

She clicked. The cell highlighted yellow. 

"3.7 kilograms. Not huge, but enough that it got flagged as 'instrument calibration error' in the post-mission report."

On the phone screen, Divya was trying to look interested. Failing. Her eyes kept drifting to the side—probably checking the time, calculating how long she had to stay awake before this conversation ended and she could go back to sleep.

"Stay with me," Priya said. "So I think, okay, fine, calibration error. These things happen. Space is hard. Measurements get fucked. But then—"

Her cursor moved down. Click. Apollo 12. November 19, 1969.

"*Then*—I'm looking at Apollo 12, just for comparison, and there's *another* discrepancy. 4.2 kilograms. Also marked as calibration error."

"Priya—"

"I'm not done." 

She was talking faster now. Her Kannada-English mix getting more pronounced the way it always did when she was excited. Or terrified. She couldn't tell which.

Apollo 15. Click. 5.1 kilograms.

Apollo 17. Click. 3.9 kilograms.

"Every. Single. Mission." Her voice had gone quiet. Almost a whisper. "Some unexplained weight that wasn't supposed to be there. Different amounts, always small enough to ignore, always blamed on measurement problems."

The cursor kept moving. Click. Click. Click.

Luna 2. Soviet mission, 1959. 2.8 kilograms.

Chang'e 3. Chinese mission, 2013. 6.4 kilograms.

Chandrayaan-2. Their mission. India's mission. 2019. 8.2 kilograms.

"Divya, are you seeing this?"

Silence on the other end.

Not the comfortable kind.

"Every mission," Priya repeated. Her mouth had gone dry. When had she last had water? The bottle on her desk was empty. Had been for. How long? "Every single lunar mission since humans started going there. Russian, American, Chinese, European, Indian."

She scrolled down. The spreadsheet went on. And on. And on.

Eighty years of data.

Eighty years of "calibration errors" and "measurement anomalies" that all happened to fall within the same statistical range and all happened to be undocumented mass *added* to the spacecraft.

Not subtracted.

Added.

"You're saying someone has been..." Divya's voice trailed off. "What? Smuggling extra weight onto moon missions? For eighty years?"

"I'm saying—"

But Priya stopped. Because saying it out loud made it real. Made it a thing that existed outside her head, outside this room, outside the safe container of her laptop screen at 2:47 AM.

2:51 AM now.

Time kept.

Slipping.

She took a breath. "I'm saying that if you add up all those discrepancies—every single unexplained kilogram from every lunar mission ever launched—you get approximately 847 kilograms of *something* that has been delivered to the lunar surface and nobody has ever asked what it was."

The words hung in the air between them.

847 kilograms.

Such a specific number. Such a precise, terrible, *specific* number.

Priya could see Divya processing this. Her friend was a software engineer. Good with systems. Good with patterns. She'd see it. She had to see it.

"That's..." Divya started. Stopped. Started again. "That's insane. That's conspiracy theory insane. You sound like those people who think the moon landing was fake, or—"

"I know how I sound!" 

Priya's voice cracked. Slightly. Just slightly. She cleared her throat.

"Aiyyo, Divya, you think I don't know how I sound? I've been sitting here for six hours trying to find the hole in this. Trying to find where I made the mistake, where I misread something, where the data is corrupted."

Six hours.

Had it been six hours?

The clock said 2:53 AM.

She'd started at... when? After dinner. Around 8 PM. That was. That was almost seven hours ago.

"But it's not," she continued. "It's all there. It's all *documented*. Not hidden, just... ignored. Explained away. Every space agency on Earth has these discrepancies in their records and everyone just shrugs and says 'calibration error' and moves on."

Her coffee mug sat on her desk. The film on top had congealed into something that looked almost solid. How long did it take for coffee to do that? Hours? Days?

How long had she been sitting here?

Divya was quiet for a long moment. Then: "Have you slept?"

"That's not—"

"Priya. When did you last sleep?"

"Yesterday. The day before. I don't—that's not the point—"

"That's exactly the point, guru." Divya's voice had gone gentle. The way people talk to someone standing on a ledge. "You're doing your PhD on the most boring topic in aerospace history and you've been stressed about your advisor and your funding and—"

"This isn't stress!" 

The words came out too loud. Too sharp.

Priya heard herself and stopped.

Took a breath.

"This isn't stress," she said again. Quieter. "I know what stress looks like. This is... something else."

She pulled up another file. A scan of an old text. The edges yellowed with age, the Kannada script faded but still legible.

"I started looking for other references. Historical stuff. Just to see if anyone else had noticed."

Her cursor hovered over the translation.

"And I found this—it's from an inscription at Hampi, dated 1565."

She read: "'When the moon grows heavy with purpose, it will return to embrace the earth.'"

The words sat there on her screen.

Heavy with purpose.

Return to embrace.

"That's just poetry—" Divya started.

"There's a Jesuit astronomer in Goa in 1640 who wrote a 400-page treatise about lunar mass accumulation." Priya was clicking through files now. Not looking at Divya anymore. Looking at the cascade of evidence that had been sitting in archives and libraries and forgotten databases for centuries. "The Vatican banned it. A British surveyor in Bangalore in 1891 built mechanical models of orbital decay—the same orbital decay that would happen if you slowly added mass to the moon over centuries."

Click.

Another file.

"They found him dead at his desk, Divya."

Click.

A photograph. Black and white. A man slumped over an elaborate brass mechanism, gears and wheels and calculations etched into metal.

"Smiling."

The word hung there.

Smiling.

"And there's this ISRO engineer," Priya continued. Her voice had gone flat. Mechanical. Like she was reading a grocery list. "2014. Chandrayaan data analyst. Brilliant guy, by all accounts. Left a suicide note that was just... mathematics. Orbital calculations. Nobody understood what he was calculating."

She pulled up the scanned note. Equations flowing across the page in neat, precise handwriting. Beautiful, really. The kind of penmanship they don't teach anymore.

Numbers and symbols and.

And.

"I think I know what he was calculating," Priya said.

Outside, the auto-rickshaw honked. Someone laughed. The world kept spinning, utterly indifferent to the fact that Priya Venkatesh was sitting in her flat at 2:56 AM having what might be a nervous breakdown or might be the only rational response to discovering something that shouldn't exist.

"Priya," Divya said carefully. Very carefully. "I think you need to step back from this. Take a break. Maybe talk to someone—"

"I calculated it."

The words came out before Priya could stop them.

"Based on the mass, the distribution, the orbital mechanics. If you kept adding weight to the moon at this rate, kept building whatever this is... the moon's orbit would decay."

Decay.

Such a gentle word for what would happen.

"Slowly. Imperceptibly at first. But it would decay."

"How slowly?" Divya asked.

And there it was.

The question Priya had been avoiding for the last hour. The calculation she'd run three times, then four times, then five times because it couldn't be right. It couldn't.

But it was.

She pulled up her final spreadsheet. The one she'd been staring at when she decided to call Divya because she couldn't be alone with it anymore.

"If they started in 1959, and if they keep going at the current rate..."

Her cursor hovered over the final cell.

The one that said: **DEORBIT COMPLETE: 2212**

"The moon would deorbit completely in approximately 177 years."

Divya laughed. It was a nervous sound. High-pitched. Wrong.

"That's... okay, but that's not—that would take—"

"177 years, 6 months, 3 days." Priya's voice had gone very quiet. "Give or take a few hours depending on solar wind variations. It's all there in the math. Someone has been building something on the moon for eighty years, and if they keep going..."

She trailed off.

Looked at the moon through her window.

It hung there.

Fat and indifferent.

The same moon humans had been staring at since before they were properly human. The same moon that pulled the tides and marked the months and inspired poetry and madness in equal measure.

The same moon that was, according to her calculations, going to fall out of the sky in 177 years, 6 months, and 3 days.

"If they keep going?" Divya prompted.

Her voice sounded far away.

Everything sounded far away.

"If they keep going," Priya said quietly, "the moon is going to fall. Not today. Not tomorrow. But it's going to fall. And someone, somewhere, has been planning this since before either of us were born."

The call was silent.

Just the hiss of the connection.

The background noise of two people breathing in different parts of the same city at 3 AM.

Then Divya's voice, very small: "Priya. Listen to yourself. Please."

"I am," Priya said. "That's the problem. I am."

She hung up.

The apartment was very quiet.

Her coffee had gone completely cold. The film on top had set into something that looked almost like skin. She should throw it out. Make fresh coffee. Eat something. Sleep.

But instead she just sat there, staring at the spreadsheet.

Numbers arranged in perfect, terrible order.

Her phone buzzed.

A text from a number she didn't recognize.

*You found the Hammer. Good. Now find the Nail.*

Priya stared at it for a long time.

The clock said 3:01 AM.

Outside, Bengaluru slept.

And the moon hung in the sky.

Patient as stone.

Heavy with purpose.

---

**End Chapter 1**`;

        // Split content into pages (roughly 1000 chars per page for readability)
        function splitIntoPages(markdown) {
            const html = marked.parse(markdown);
            const tempDiv = document.createElement('div');
            tempDiv.innerHTML = html;

            const paragraphs = Array.from(tempDiv.querySelectorAll('h1, p, hr'));
            const pages = [];
            let currentPage = [];
            let currentLength = 0;
            const maxLength = 3500; // Characters per page

            paragraphs.forEach((p) => {
                const text = p.textContent || '';

                if (currentLength + text.length > maxLength && currentPage.length > 0) {
                    pages.push(currentPage.join(''));
                    currentPage = [];
                    currentLength = 0;
                }

                currentPage.push(p.outerHTML);
                currentLength += text.length;
            });

            if (currentPage.length > 0) {
                pages.push(currentPage.join(''));
            }

            return pages;
        }

        // Initialize reader
        let currentPage = 0;
        const pages = splitIntoPages(storyMarkdown);

        const contentEl = document.getElementById('content');
        const progressEl = document.getElementById('progress');
        const prevBtn = document.getElementById('prevBtn');
        const nextBtn = document.getElementById('nextBtn');

        // Page indicator buttons
        const pageIndicators = [
            document.getElementById('page1'),
            document.getElementById('page2'),
            document.getElementById('page3')
        ];

        function renderPage() {
            contentEl.classList.remove('page-fade');
            void contentEl.offsetWidth; // Trigger reflow
            contentEl.classList.add('page-fade');

            contentEl.innerHTML = pages[currentPage];
            progressEl.textContent = `${currentPage + 1} / ${pages.length}`;

            // Update buttons
            prevBtn.disabled = currentPage === 0;
            nextBtn.disabled = currentPage === pages.length - 1;

            // Update page indicators
            pageIndicators.forEach((btn, idx) => {
                if (idx < pages.length) {
                    btn.classList.toggle('bg-black', idx === currentPage);
                    btn.classList.toggle('bg-stone-300', idx !== currentPage);
                    btn.style.display = 'block';
                } else {
                    btn.style.display = 'none';
                }
            });

            // Scroll to top
            window.scrollTo({ top: 0, behavior: 'smooth' });
        }

        // Navigation
        prevBtn.addEventListener('click', () => {
            if (currentPage > 0) {
                currentPage--;
                renderPage();
            }
        });

        nextBtn.addEventListener('click', () => {
            if (currentPage < pages.length - 1) {
                currentPage++;
                renderPage();
            }
        });

        // Page indicator clicks
        pageIndicators.forEach((btn, idx) => {
            btn.addEventListener('click', () => {
                if (idx < pages.length) {
                    currentPage = idx;
                    renderPage();
                }
            });
        });

        // Keyboard navigation
        document.addEventListener('keydown', (e) => {
            if (e.key === 'ArrowLeft' && currentPage > 0) {
                currentPage--;
                renderPage();
            } else if (e.key === 'ArrowRight' && currentPage < pages.length - 1) {
                currentPage++;
                renderPage();
            }
        });

        // Initial render
        renderPage();
    </script>
</body>
