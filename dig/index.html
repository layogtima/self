  <style>
    html, body {
      margin: 0;
      height: 100%;
      /* dark letterbox so the bars above/below the 16:9 canvas read as a frame,
         not stray cream-coloured gaps */
      background: #1D2433;
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: hidden;
    }
    canvas {
      image-rendering: pixelated;
      width: min(100vw, calc(100vh * 16 / 9));
      aspect-ratio: 16 / 9;
      cursor: crosshair;
    }
  </style>
</head>
<body>
  <canvas id="game" width="960" height="540"></canvas>
  <script type="module" src="src/main.js"></script>
</body>
