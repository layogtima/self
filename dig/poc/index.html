<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>DIG — a game about digging a hole</title>
  <style>
    html, body {
      margin: 0;
      height: 100%;
      background: #111;
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: hidden;
    }
    canvas {
      image-rendering: pixelated;
      width: min(100vw, calc(100vh * 16 / 9));
      aspect-ratio: 16 / 9;
      cursor: crosshair;
    }
  </style>
</head>
<body>
  <canvas id="game" width="960" height="540"></canvas>
  <script src="game.js"></script>
</body>
</html>
