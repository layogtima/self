<!DOCTYPE html>
<html lang="en" class="scroll-smooth">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" id="meta-description"
    content="FERMENT - A cultural guide to lactic acid fermentation from around the world. Browse recipes, track batches, and master the ancient art of fermentation.">
  <meta name="theme-color" content="#C4A35A">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="default">
  <meta name="apple-mobile-web-app-title" content="FERMENT">

  <!-- Open Graph -->
  <meta property="og:type" content="website" id="og-type">
  <meta property="og:title" content="FERMENT - Your Fermentation Companion" id="og-title">
  <meta property="og:description"
    content="A cultural guide to lactic acid fermentation from around the world. Browse recipes, track batches, and master the ancient art of fermentation."
    id="og-description">
  <meta property="og:image" id="og-image" content="https://ferment.layogtima.com/assets/images/meta.jpg">
  <meta property="og:site_name" content="FERMENT">
  <!-- Twitter Card -->
  <meta name="twitter:card" content="summary_large_image" id="twitter-card">
  <meta name="twitter:title" content="FERMENT - Your Fermentation Companion" id="twitter-title">
  <meta name="twitter:description" content="A cultural guide to lactic acid fermentation from around the world."
    id="twitter-description">
  <meta name="twitter:image" id="twitter-image" content="https://ferment.layogtima.com/assets/images/meta.jpg">
  <link rel="manifest" href="manifest.json">
  <link rel="icon" type="image/svg+xml" href="assets/icons/favicon.svg">
  <link rel="apple-touch-icon" href="assets/icons/icon-192.png">

  <title>FERMENT - Fermentation Companion</title>

  <!-- Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link
    href="https://fonts.googleapis.com/css2?family=Instrument+Serif:ital@0;1&family=DM+Sans:ital,opsz,wght@0,9..40,300..700;1,9..40,300..700&family=JetBrains+Mono:wght@400;500&display=swap"
    rel="stylesheet">

  <!-- Tailwind CSS -->
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      darkMode: 'class',
      theme: {
        extend: {
          colors: {
            bg: {
              primary: '#FAF7F2',
              secondary: '#F2ECE3',
              card: '#FFFFFF',
            },
            text: {
              primary: '#2C1810',
              secondary: '#6B5344',
              muted: '#A89485',
            },
            accent: {
              brine: '#C4A35A',
              ferment: '#D4553A',
              culture: '#7B8F3A',
              aged: '#8B6B4A',
            },
            tier: {
              beginner: '#8EAE68',
              seasoned: '#C4A35A',
              ambitious: '#D4813A',
              advanced: '#D4553A',
              master: '#6B3A5C',
            },
            dark: {
              primary: '#1A1410',
              secondary: '#241E18',
              card: '#2E2620',
              text: '#F2ECE3',
              'text-secondary': '#C4B5A3',
            }
          },
          fontFamily: {
            serif: ['"Instrument Serif"', 'Georgia', 'serif'],
            sans: ['"DM Sans"', 'system-ui', 'sans-serif'],
            mono: ['"JetBrains Mono"', 'monospace'],
          },
          borderRadius: {
            '2xl': '16px',
            'xl': '12px',
          },
          boxShadow: {
            'warm': 'none',
            'warm-lg': 'none',
            'warm-xl': 'none',
          },
          transitionTimingFunction: {
            'ferment': 'cubic-bezier(0.4, 0, 0.2, 1)',
          }
        }
      }
    }
  </script>

  <!-- Custom Styles -->
  <link rel="stylesheet" href="css/app.css">
</head>

<body
  class="bg-bg-primary text-text-primary font-sans antialiased min-h-screen dark:bg-dark-primary dark:text-dark-text">
  <div id="app">
    <!-- Loading State -->
    <div v-if="!ready" class="fixed inset-0 bg-bg-primary flex items-center justify-center z-50">
      <div class="text-center">
        <div class="text-6xl mb-4">🫙</div>
        <h1 class="font-serif text-3xl text-text-primary mb-2">FERMENT</h1>
        <p class="text-text-muted text-sm">Culturing...</p>
      </div>
    </div>

    <!-- Welcome Page (full-screen, replaces entire app shell) -->
    <template v-else-if="currentRoute === 'welcome'">
      <welcome-page @enter="enterApp" @navigate="(tab) => { enterApp(); $nextTick(() => { currentTab = tab; }); }"
        @open-recipe="(id) => { enterApp(); $nextTick(() => { const r = allRecipes.find(r => r.id === id); if (r) openRecipe(r); }); }" />
    </template>

    <!-- App Shell -->
    <div v-else class="min-h-screen flex flex-col">
      <!-- Unified Top Bar: Logo + Tabs + Actions -->
      <header
        class="sticky top-0 z-40 bg-bg-primary/95 backdrop-blur-sm border-b border-bg-secondary dark:bg-dark-primary/95 dark:border-dark-secondary">
        <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
          <div class="flex items-center h-12 gap-4">
            <!-- Logo -->
            <div class="flex items-center gap-2 cursor-pointer flex-shrink-0"
              @click="currentTab = 'browse'; currentRoute = 'home'">
              🫙
              <h1 class="font-serif text-lg tracking-tight">FERMENT</h1>
            </div>

            <!-- Divider -->
            <div class="w-px h-6 bg-bg-secondary dark:bg-dark-secondary flex-shrink-0"></div>

            <!-- Nav Tabs (inline, desktop only) -->
            <nav class="hidden sm:flex gap-1 overflow-x-auto scrollbar-hide flex-1">
              <button v-for="tab in tabs" :key="tab.id"
                @click="currentTab = tab.id; currentRoute = 'home'; selectedRecipe = null" :class="[
                  'px-3 py-1.5 rounded-lg text-sm font-medium whitespace-nowrap transition-all duration-200',
                  currentTab === tab.id && currentRoute !== 'recipe'
                    ? 'bg-accent-brine/10 text-accent-aged dark:text-accent-brine border border-accent-brine/20'
                    : 'text-text-secondary hover:bg-bg-secondary dark:hover:bg-dark-secondary border border-transparent'
                ]" :aria-current="currentTab === tab.id ? 'page' : undefined">
                {{ tab.label }}
              </button>
            </nav>

            <!-- Actions -->
            <div class="flex items-center gap-1 flex-shrink-0 ml-auto">
              <button @click="toggleTheme"
                class="p-1.5 rounded-lg hover:bg-bg-secondary transition-colors dark:hover:bg-dark-secondary"
                :aria-label="settings.theme === 'dark' ? 'Switch to light mode' : 'Switch to dark mode'">
                <svg v-if="settings.theme !== 'dark'" class="w-4 h-4" fill="none" stroke="currentColor"
                  viewBox="0 0 24 24">
                  <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                    d="M20.354 15.354A9 9 0 018.646 3.646 9.003 9.003 0 0012 21a9.003 9.003 0 008.354-5.646z" />
                </svg>
                <svg v-else class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                  <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                    d="M12 3v1m0 16v1m9-9h-1M4 12H3m15.364 6.364l-.707-.707M6.343 6.343l-.707-.707m12.728 0l-.707.707M6.343 17.657l-.707.707M16 12a4 4 0 11-8 0 4 4 0 018 0z" />
                </svg>
              </button>
              <button @click="showSettings = true"
                class="p-1.5 rounded-lg hover:bg-bg-secondary transition-colors dark:hover:bg-dark-secondary"
                aria-label="Settings">
                <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                  <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                    d="M10.325 4.317c.426-1.756 2.924-1.756 3.35 0a1.724 1.724 0 002.573 1.066c1.543-.94 3.31.826 2.37 2.37a1.724 1.724 0 001.066 2.573c1.756.426 1.756 2.924 0 3.35a1.724 1.724 0 00-1.066 2.573c.94 1.543-.826 3.31-2.37 2.37a1.724 1.724 0 00-2.573 1.066c-.426 1.756-2.924 1.756-3.35 0a1.724 1.724 0 00-2.573-1.066c-1.543.94-3.31-.826-2.37-2.37a1.724 1.724 0 00-1.066-2.573c-1.756-.426-1.756-2.924 0-3.35a1.724 1.724 0 001.066-2.573c-.94-1.543.826-3.31 2.37-2.37.996.608 2.296.07 2.572-1.065z" />
                  <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                    d="M15 12a3 3 0 11-6 0 3 3 0 016 0z" />
                </svg>
              </button>
            </div>
          </div>
        </div>
      </header>

      <!-- Main Content -->
      <main class="flex-1 max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 py-6 w-full">

        <!-- Changelog (full-page view) -->
        <div v-if="currentRoute === 'changelog'" class="min-h-screen pb-24 sm:pb-8">
          <changelog-view :standalone="true" @close="closeChangelog()"></changelog-view>
        </div>

        <!-- Wiki Article (full-page view) -->
        <div v-else-if="currentRoute === 'wiki-article' && selectedWikiArticle">
          <wiki-article :article="selectedWikiArticle" :all-articles="wikiArticles" :all-recipes="allRecipes"
            :settings="settings" :contextual-nav-active-tab="contextualNavActive" @close="closeWikiArticle"
            @open-article="openWikiArticle($event)" @open-recipe="openRecipeFromWiki($event)"
            @set-nav="setContextualNav($event.tabs, $event.active)" @update-nav-active="contextualNavActive = $event"
            @clear-nav="clearContextualNav()">
          </wiki-article>
        </div>

        <!-- Recipe Page (full-page view, replaces modal) -->
        <div v-else-if="currentRoute === 'recipe' && selectedRecipe">
          <recipe-page :recipe="selectedRecipe" :pantry="pantry" :recipe-notes="recipeNotes" :favorites="favorites"
            :bookmarks="bookmarks" :settings="settings" :contextual-nav-active-tab="contextualNavActive"
            @close="closeRecipe" @toggle-favorite="toggleFavorite($event)" @toggle-bookmark="toggleBookmark($event)"
            @update-notes="updateRecipeNotes($event)" @start-batch="startBatch($event)"
            @add-to-pantry="addToPantry($event)" @set-nav="setContextualNav($event.tabs, $event.active)"
            @update-nav-active="contextualNavActive = $event" @clear-nav="clearContextualNav()">
          </recipe-page>
        </div>

        <!-- Normal Tab Content -->
        <template v-else>
          <!-- Browse Tab -->
          <div v-show="currentTab === 'browse'">
            <browse-view :recipes="filteredRecipes" :all-recipes="allRecipes" :filters="filters" :view-mode="viewMode"
              :pantry="pantry" :favorites="favorites" :bookmarks="bookmarks" :user-level="userLevel"
              :settings="settings" @update:view-mode="viewMode = $event" @update:filters="updateFilters($event)"
              @open-recipe="openRecipe($event)" @toggle-favorite="toggleFavorite($event)"
              @toggle-bookmark="toggleBookmark($event)" @start-batch="startBatch($event)">
            </browse-view>
          </div>

          <!-- Wiki Tab -->
          <div v-show="currentTab === 'wiki'">
            <wiki-view :articles="wikiArticles" :recipes="allRecipes" @open-article="openWikiArticle($event)"
              @open-recipe="openRecipe($event)">
            </wiki-view>
          </div>

          <!-- Pantry Tab -->
          <div v-show="currentTab === 'pantry'">
            <pantry-manager :pantry="pantry" :recipes="allRecipes" @update:pantry="updatePantry($event)"
              @browse-matching="browseMatchingRecipes">
            </pantry-manager>
          </div>

          <!-- Journal Tab -->
          <div v-show="currentTab === 'journal'">
            <journal-manager :batches="journal.batches" :recipes="allRecipes" :stats="journal.stats"
              :user-level="userLevel" @update:batches="updateBatches($event)" @open-recipe="openRecipe($event)">
            </journal-manager>
          </div>

          <!-- Tools Tab -->
          <div v-show="currentTab === 'tools'">
            <tools-view :settings="settings" :recipes="allRecipes" @open-wiki="currentTab = 'wiki'">
            </tools-view>
          </div>
        </template>
      </main>

      <!-- Footer -->
      <footer class="border-t border-bg-secondary py-6 mt-8 dark:border-dark-secondary">
        <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 text-center space-y-2">
          <p class="text-text-muted text-sm">
            <em class="font-serif">"May your cultures be strong, your brine be clear, and your jars
              never explode."</em>
          </p>
          <p class="text-xs text-text-muted">
            <button @click="openChangelog()"
              class="hover:text-accent-brine transition-colors underline-offset-2 hover:underline">What's New ↗</button>
          </p>
        </div>
      </footer>

      <!-- Contextual Secondary Nav (screen-specific, fixed above main nav) -->
      <nav v-if="contextualNavTabs.length > 0"
        class="sm:hidden fixed bottom-14 left-0 right-0 z-30 bg-bg-primary dark:bg-dark-primary border-t border-bg-secondary dark:border-dark-secondary">
        <div class="flex divide-x divide-bg-secondary dark:divide-dark-secondary">
          <button v-for="tab in contextualNavTabs" :key="tab.id" @click="contextualNavActive = tab.id"
            :class="['flex-1 flex items-center justify-center gap-1.5 py-2 px-3 text-xs font-medium transition-all duration-200 border-b-2 whitespace-nowrap min-w-0',
              contextualNavActive === tab.id
                ? 'border-accent-brine text-accent-aged dark:text-accent-brine bg-accent-brine/5'
                : 'border-transparent text-text-muted hover:text-text-secondary hover:bg-bg-secondary/50 dark:hover:bg-dark-secondary/30']">
            <span v-if="tab.icon" class="text-[11px] leading-none">{{ tab.icon }}</span>
            {{ tab.label }}
          </button>
        </div>
      </nav>

      <!-- Mobile Bottom Tab Bar -->
      <nav
        class="sm:hidden fixed bottom-0 left-0 right-0 z-40 bg-bg-primary/95 dark:bg-dark-primary/95 backdrop-blur-sm border-t border-bg-secondary dark:border-dark-secondary safe-area-bottom">
        <div class="flex items-stretch divide-x divide-bg-secondary/60 dark:divide-dark-secondary/60">
          <button @click="currentTab = 'browse'; currentRoute = 'home'; selectedRecipe = null" :class="['flex-1 flex flex-col items-center gap-0.5 py-2 pt-2.5 text-xs font-medium transition-colors',
              currentTab === 'browse' && currentRoute !== 'recipe' ? 'text-accent-brine' : 'text-text-muted']">
            <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
              <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                d="M19 11H5m14 0a2 2 0 012 2v6a2 2 0 01-2 2H5a2 2 0 01-2-2v-6a2 2 0 012-2m14 0V9a2 2 0 00-2-2M5 11V9a2 2 0 012-2m0 0V5a2 2 0 012-2h6a2 2 0 012 2v2M7 7h10" />
            </svg>
            Browse
          </button>
          <button @click="currentTab = 'wiki'; currentRoute = 'home'; selectedRecipe = null; selectedWikiArticle = null"
            :class="['flex-1 flex flex-col items-center gap-0.5 py-2 pt-2.5 text-xs font-medium transition-colors',
              currentTab === 'wiki' && currentRoute !== 'recipe' && currentRoute !== 'wiki-article' ? 'text-accent-brine' : 'text-text-muted']">
            <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
              <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                d="M12 6.253v13m0-13C10.832 5.477 9.246 5 7.5 5S4.168 5.477 3 6.253v13C4.168 18.477 5.754 18 7.5 18s3.332.477 4.5 1.253m0-13C13.168 5.477 14.754 5 16.5 5c1.747 0 3.332.477 4.5 1.253v13C19.832 18.477 18.247 18 16.5 18c-1.746 0-3.332.477-4.5 1.253" />
            </svg>
            Wiki
          </button>
          <button @click="currentTab = 'pantry'; currentRoute = 'home'; selectedRecipe = null" :class="['flex-1 flex flex-col items-center gap-0.5 py-2 pt-2.5 text-xs font-medium transition-colors',
              currentTab === 'pantry' && currentRoute !== 'recipe' ? 'text-accent-brine' : 'text-text-muted']">
            <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
              <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                d="M20 7l-8-4-8 4m16 0l-8 4m8-4v10l-8 4m0-10L4 7m8 4v10M4 7v10l8 4" />
            </svg>
            Pantry
          </button>
          <button @click="currentTab = 'journal'; currentRoute = 'home'; selectedRecipe = null" :class="['flex-1 flex flex-col items-center gap-0.5 py-2 pt-2.5 text-xs font-medium transition-colors',
              currentTab === 'journal' && currentRoute !== 'recipe' ? 'text-accent-brine' : 'text-text-muted']">
            <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
              <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                d="M12 6.253v13m0-13C10.832 5.477 9.246 5 7.5 5S4.168 5.477 3 6.253v13C4.168 18.477 5.754 18 7.5 18s3.332.477 4.5 1.253m0-13C13.168 5.477 14.754 5 16.5 5c1.747 0 3.332.477 4.5 1.253v13C19.832 18.477 18.247 18 16.5 18c-1.746 0-3.332.477-4.5 1.253" />
            </svg>
            Journal
          </button>
          <button @click="currentTab = 'tools'; currentRoute = 'home'; selectedRecipe = null" :class="['flex-1 flex flex-col items-center gap-0.5 py-2 pt-2.5 text-xs font-medium transition-colors',
              currentTab === 'tools' && currentRoute !== 'recipe' ? 'text-accent-brine' : 'text-text-muted']">
            <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
              <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                d="M10.325 4.317c.426-1.756 2.924-1.756 3.35 0a1.724 1.724 0 002.573 1.066c1.543-.94 3.31.826 2.37 2.37a1.724 1.724 0 001.066 2.573c1.756.426 1.756 2.924 0 3.35a1.724 1.724 0 00-1.066 2.573c.94 1.543-.826 3.31-2.37 2.37a1.724 1.724 0 00-2.573 1.066c-.426 1.756-2.924 1.756-3.35 0a1.724 1.724 0 00-2.573-1.066c-1.543.94-3.31-.826-2.37-2.37a1.724 1.724 0 00-1.066-2.573c-1.756-.426-1.756-2.924 0-3.35a1.724 1.724 0 001.066-2.573c-.94-1.543.826-3.31 2.37-2.37.996.608 2.296.07 2.572-1.065z" />
              <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                d="M15 12a3 3 0 11-6 0 3 3 0 016 0z" />
            </svg>
            Tools
          </button>
        </div>
      </nav>
    </div>



    <!-- Settings Modal -->
    <settings-modal v-if="showSettings" :settings="settings" :user-level="userLevel" @close="showSettings = false"
      @update:settings="updateSettings($event)" @export-data="exportData" @import-data="importData($event)"
      @clear-data="clearData" @show-welcome="showWelcome" @show-changelog="showSettings = false; openChangelog()">
    </settings-modal>

    <!-- Onboarding (deferred until user leaves welcome page) -->
    <onboarding-modal v-if="!settings.onboardingComplete && currentRoute !== 'welcome'" :settings="settings"
      @complete="completeOnboarding($event)">
    </onboarding-modal>
  </div>

  <!-- Vue.js -->
  <script src="https://unpkg.com/vue@3/dist/vue.global.prod.js"></script>

  <!-- App Scripts (v=20260310 - bump this string on every deployment to bust browser cache) -->
  <script src="js/utils/formatting.js?v=20260310b"></script>
  <script src="js/utils/search.js?v=20260310b"></script>
  <script src="js/utils/matching.js?v=20260310b"></script>
  <script src="js/store.js?v=20260310b"></script>
  <!-- Recipe loader (fetches individual JSON files, falls back to tier*.js) -->
  <script src="js/recipes.js?v=20260310b"></script>
  <!-- Fallback: tier1 recipes loaded via script tag in case JSON fetch fails -->
  <script src="data/recipes/tier1-beginner.js?v=20260310b"></script>
  <!-- Wiki loader -->
  <script src="js/wiki.js?v=20260310b"></script>
  <script src="js/components/SearchBar.js?v=20260310b"></script>
  <script src="js/components/FilterPanel.js?v=20260310b"></script>
  <script src="js/components/RecipeCard.js?v=20260310b"></script>
  <script src="js/components/RecipePage.js?v=20260310b"></script>
  <script src="js/components/PantryManager.js?v=20260310b"></script>
  <script src="js/components/JournalManager.js?v=20260310b"></script>
  <script src="js/components/BrineCalculator.js?v=20260310b"></script>
  <script src="js/components/BatchScaler.js?v=20260310b"></script>
  <script src="js/components/TimerManager.js?v=20260310b"></script>
  <script src="js/components/BrowseView.js?v=20260310b"></script>
  <script src="js/components/ToolsView.js?v=20260310b"></script>
  <script src="js/components/SettingsModal.js?v=20260310b"></script>
  <script src="js/components/OnboardingModal.js?v=20260310b"></script>
  <script src="js/components/WikiView.js?v=20260310b"></script>
  <script src="js/components/WikiArticle.js?v=20260310b"></script>
  <script src="js/components/WelcomePage.js?v=20260310b"></script>
  <script src="js/components/ChangelogView.js?v=20260310b"></script>
  <script src="js/components/InlineEditor.js?v=20260310b"></script>
  <script src="js/components/editors/TextEditor.js?v=20260310b"></script>
  <script src="js/components/editors/ListEditor.js?v=20260310b"></script>
  <script src="js/components/editors/MediaPicker.js?v=20260310b"></script>
  <script src="js/components/editors/TagEditor.js?v=20260310b"></script>
  <script src="js/components/editors/CitationEditor.js?v=20260310b"></script>
  <script src="js/app.js?v=20260310b"></script>

  <!-- Service Worker Registration -->
  <script>
    if ('serviceWorker' in navigator) {
      window.addEventListener('load', () => {
        navigator.serviceWorker.register('sw.js')
          .then(reg => console.log('SW registered:', reg.scope))
          .catch(err => console.log('SW registration failed:', err));
      });
    }
  </script>
</body>

</html>
