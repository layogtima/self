<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<title>formicarium — Messor barbarus</title>
<style>
  html, body { margin: 0; height: 100%; overflow: hidden; background: #0c0a08; }
  #c { display: block; touch-action: none; cursor: crosshair; }
  /* the vitrine: warm desk-lamp key light + glass sheen over the tank */
  #lamp {
    position: fixed; inset: 0; pointer-events: none; z-index: 1;
    background:
      radial-gradient(120% 90% at 30% 6%, rgba(255,214,150,0.16), rgba(255,190,120,0) 46%),
      radial-gradient(140% 120% at 50% 120%, rgba(0,0,0,0.5), rgba(0,0,0,0) 60%);
  }
  #glass {
    position: fixed; inset: 0; pointer-events: none; z-index: 2;
    box-shadow: inset 0 0 160px 24px rgba(0,0,0,0.45);
    background: linear-gradient(115deg, rgba(255,255,255,0.05) 0%, rgba(255,255,255,0) 18% 82%, rgba(255,255,255,0.03) 100%);
  }
  #err { position: fixed; left: 8px; top: 8px; z-index: 9; color: #ff8a8a;
    font: 12px ui-monospace, monospace; white-space: pre-wrap; display: none; }
</style>
</head>
<body>
<canvas id="c"></canvas>
<div id="lamp"></div>
<div id="glass"></div>
<pre id="err"></pre>
<script>
  addEventListener('error', e => { const el = document.getElementById('err'); el.style.display = 'block'; el.textContent += (e.message || e.error) + '\n'; });
</script>
<script type="module" src="./src/main.js"></script>
</body>
</html>
