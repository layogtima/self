<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>WONDERVOID — Ship Registry</title>
<meta name="viewport" content="width=device-width, initial-scale=1">
<style>
  :root { --ink:#dfe9f5; --gold:#ffc466; --holo:#7ee0ff; }
  * { box-sizing: border-box; }
  html, body { margin: 0; min-height: 100%; background: #04060c; color: var(--ink);
    font-family: "Avenir Next", "Futura", "Trebuchet MS", sans-serif; }
  body {
    background:
      radial-gradient(1200px 700px at 70% -10%, rgba(40,70,110,0.35), transparent),
      radial-gradient(900px 600px at 10% 110%, rgba(90,40,90,0.25), transparent),
      #04060c;
  }
  /* drifting starfield */
  #stars { position: fixed; inset: 0; z-index: 0; pointer-events: none; }
  header { position: relative; z-index: 1; text-align: center; padding: 8vh 20px 2vh; }
  header .kicker { font-size: 12px; letter-spacing: 0.5em; text-transform: uppercase; color: var(--gold); }
  header h1 {
    margin: 12px 0 6px; font-size: clamp(34px, 8vw, 84px); letter-spacing: 0.34em; text-indent: 0.34em;
    font-weight: 700; color: #fff; text-shadow: 0 0 30px rgba(126,224,255,0.5);
  }
  header p { margin: 0 auto; max-width: 620px; font-size: 14px; line-height: 1.7; color: rgba(223,233,245,0.7); }

  main { position: relative; z-index: 1; max-width: 1080px; margin: 0 auto; padding: 4vh 20px 8vh;
    display: grid; grid-template-columns: repeat(auto-fit, minmax(300px, 1fr)); gap: 22px; }

  .ship { display: block; text-decoration: none; color: inherit; border-radius: 12px; overflow: hidden;
    border: 1px solid rgba(126,224,255,0.22); background: linear-gradient(rgba(10,20,34,0.7), rgba(6,12,22,0.7));
    transition: transform 0.25s, box-shadow 0.25s, border-color 0.25s; }
  .ship:hover { transform: translateY(-4px); border-color: rgba(126,224,255,0.6);
    box-shadow: 0 18px 50px rgba(0,0,0,0.55), 0 0 26px rgba(126,224,255,0.18); }
  .ship .poster { aspect-ratio: 16/10; background: #0a1220 center/cover no-repeat; position: relative; }
  .ship .poster::after { content: ""; position: absolute; inset: 0;
    background: linear-gradient(transparent 55%, rgba(6,12,22,0.9)); }
  .ship .body { padding: 16px 18px 20px; }
  .ship .name { font-size: 17px; letter-spacing: 0.14em; text-transform: uppercase; color: #fff; }
  .ship .slice { font-size: 10px; letter-spacing: 0.24em; text-transform: uppercase; color: var(--gold); margin-top: 3px; }
  .ship .desc { font-size: 13px; line-height: 1.6; color: rgba(223,233,245,0.72); margin-top: 10px; }
  .ship .tags { margin-top: 12px; display: flex; flex-wrap: wrap; gap: 6px; }
  .ship .tag { font-size: 10px; letter-spacing: 0.08em; padding: 3px 8px; border-radius: 20px;
    color: var(--holo); border: 1px solid rgba(126,224,255,0.28); }
  .ship .go { margin-top: 14px; font-size: 12px; letter-spacing: 0.2em; text-transform: uppercase; color: var(--holo); }

  .ghost { border-style: dashed; opacity: 0.6; }
  .ghost .poster { background: repeating-linear-gradient(45deg, #0a1220, #0a1220 12px, #0d1626 12px, #0d1626 24px); }
  .ghost .go { color: rgba(223,233,245,0.4); }

  footer { position: relative; z-index: 1; text-align: center; padding: 0 20px 6vh;
    font-size: 11px; letter-spacing: 0.2em; text-transform: uppercase; color: rgba(223,233,245,0.35); }
</style>
</head>
<body>
  <canvas id="stars"></canvas>

  <header>
    <div class="kicker">Wondervoid Fleet Registry</div>
    <h1>SHIPYARD</h1>
    <p>Every hull the Wondervoid has worn. Two survive as living builds; the
       iterations between them live on only in the design log. Pick a ship.</p>
  </header>

  <main id="fleet"></main>

  <footer>Wondervoid · orbiter · pick a hull and it flies</footer>

  <script>
    const SHIPS = [
      {
        name: 'The Carrier', slice: 'Slice 1 · the original',
        href: './ships/carrier/index.html', poster: './posters/carrier.png',
        desc: 'The one that started it: a kilometre-scale Homeworld carrier with a whole amusement park — ferris wheel, coaster, carousel, 300 guests — glowing through a giant viewport.',
        tags: ['Homeworld hull', 'live park', 'guests', 'cinematic dive'],
      },
      {
        name: 'The Monolith', slice: 'Slice 6 · current',
        href: './ships/monolith/index.html', poster: './posters/monolith.png',
        desc: 'A brutalist Voronoi hull with light seams, one porcelain Atrium, and NOVA. Grow chambers and halls slot by slot until you reach the sealed bays. Alive universe, hyperspace, mushroom-Orokin.',
        tags: ['voronoi hull', 'organic growth', 'NOVA', 'starmap floors', 'hyperspace'],
      },
      {
        name: 'The Lost Iterations', slice: 'Slices 2–5 · in the log',
        ghost: true,
        desc: 'Hive Carrier · The Blossom · OCTAVE — four redesigns that were overwritten before they were committed. They survive as docs/DESIGN.md. Reconstructable on request.',
        tags: ['design log only'],
      },
    ];

    const fleet = document.getElementById('fleet');
    for (const s of SHIPS) {
      const a = document.createElement(s.ghost ? 'div' : 'a');
      a.className = 'ship' + (s.ghost ? ' ghost' : '');
      if (!s.ghost) a.href = s.href;
      a.innerHTML = `
        <div class="poster" ${s.poster ? `style="background-image:url('${s.poster}')"` : ''}></div>
        <div class="body">
          <div class="name">${s.name}</div>
          <div class="slice">${s.slice}</div>
          <div class="desc">${s.desc}</div>
          <div class="tags">${s.tags.map(t => `<span class="tag">${t}</span>`).join('')}</div>
          <div class="go">${s.ghost ? 'archived' : 'launch ▸'}</div>
        </div>`;
      fleet.appendChild(a);
    }

    // cheap drifting starfield
    const cv = document.getElementById('stars');
    const ctx = cv.getContext('2d');
    let stars = [];
    function resize() {
      cv.width = innerWidth; cv.height = innerHeight;
      stars = Array.from({ length: 220 }, () => ({
        x: Math.random() * cv.width, y: Math.random() * cv.height,
        z: Math.random() * 0.8 + 0.2, r: Math.random() * 1.4 + 0.3,
      }));
    }
    resize(); addEventListener('resize', resize);
    (function tick() {
      requestAnimationFrame(tick);
      ctx.clearRect(0, 0, cv.width, cv.height);
      for (const s of stars) {
        s.x -= s.z * 0.15;
        if (s.x < 0) s.x = cv.width;
        ctx.fillStyle = `rgba(200,220,245,${s.z * 0.7})`;
        ctx.fillRect(s.x, s.y, s.r, s.r);
      }
    })();
  </script>
</body>
</html>
